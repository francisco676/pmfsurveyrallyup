<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGC Diagnostic Survey | RallyUp</title>

<!-- Microsoft Clarity -->
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "vua7pfx9pc");
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #09090b;
    --surface: #18181b;
    --border: rgba(255,255,255,0.08);
    --gray: #71717a;
    --white: #fafafa;
    --lime: #D8EC6A;
    --lime-dim: rgba(216,236,106,0.12);
    --lime-border: rgba(216,236,106,0.25);
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    line-height: 1.6;
  }

  .header {
    padding: 32px 24px 0;
    max-width: 600px;
    margin: 0 auto;
    text-align: center;
  }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; display: inline-block; }
  .logo span { color: var(--lime); }

  .container { max-width: 600px; margin: 0 auto; padding: 40px 24px 120px; }
  .section { display: none; animation: fadeIn 0.3s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-title { font-size: 24px; font-weight: 800; margin-bottom: 28px; letter-spacing: -0.02em; line-height: 1.25; }
  .question { margin-bottom: 28px; }
  .q-label { font-size: 15px; font-weight: 600; margin-bottom: 6px; }

  input[type="email"], input[type="text"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; color: var(--white);
    font-family: inherit; font-size: 15px; transition: border-color 0.2s; outline: none;
  }
  input[type="email"]:focus, input[type="text"]:focus { border-color: rgba(216,236,106,0.4); }
  input::placeholder { color: var(--gray); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 10px 18px; border-radius: 50px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; user-select: none; line-height: 1.4; text-align: left;
  }
  .chip:hover { border-color: var(--lime-border); background: var(--lime-dim); }
  .chip.selected { background: var(--lime-dim); border-color: var(--lime); color: var(--lime); }

  .field-error { font-size: 13px; color: #f87171; margin-top: 10px; display: none; }
  .field-error.show { display: block; }

  .welcome { text-align: center; padding: 24px 0 0; }
  .welcome h2 { font-size: 30px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; line-height: 1.2; }
  .welcome p { color: var(--gray); font-size: 16px; max-width: 400px; margin: 0 auto 28px; line-height: 1.7; }
  .welcome-cta {
    display: inline-block;
    background: var(--lime); color: #09090b;
    font-family: inherit; font-weight: 800; font-size: 17px;
    padding: 18px 36px; border-radius: 12px;
    border: none; cursor: pointer;
    transition: background 0.15s, transform 0.15s;
    letter-spacing: -0.01em;
  }
  .welcome-cta:hover { background: #c8dc5a; transform: translateY(-2px); }

  .nav-bar.welcome-mode { padding: 12px 24px 20px; }

  #confirmation-screen {
    display: none;
    max-width: 600px;
    margin: 0 auto;
    padding: 0 24px 80px;
    animation: fadeIn 0.4s ease;
  }
  .diag-header { padding-top: 40px; text-align: center; margin-bottom: 32px; }
  .diag-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 24px; }
  .diag-logo span { color: var(--lime); }
  .diag-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--lime-dim); border: 1px solid var(--lime-border);
    color: var(--lime); font-size: 12px; font-weight: 700;
    padding: 6px 16px; border-radius: 50px; margin-bottom: 20px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .diag-badge::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--lime); border-radius: 50%; }
  .diag-title {
    font-size: 26px; font-weight: 800; letter-spacing: -0.03em;
    line-height: 1.2; margin-bottom: 12px;
  }
  .diag-title span { color: var(--lime); }
  .diag-subtitle {
    color: var(--gray); font-size: 15px; line-height: 1.7;
    max-width: 460px; margin: 0 auto;
  }
  .diag-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 16px;
  }
  .diag-card-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--gray); margin-bottom: 8px;
  }
  .diag-card-text { font-size: 15px; line-height: 1.7; color: var(--white); }
  .diag-card-text ul { list-style: none; padding: 0; margin: 0; }
  .diag-card-text li { padding: 6px 0 6px 20px; position: relative; font-size: 14px; line-height: 1.6; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .diag-card-text li:last-child { border-bottom: none; }
  .diag-card-text li::before { content: '→'; position: absolute; left: 0; color: var(--lime); font-size: 12px; top: 8px; }
  .diag-card-text li strong { color: var(--white); font-weight: 700; }
  .diag-card.cure { border-color: var(--lime-border); background: var(--lime-dim); }
  .diag-card.cure .diag-card-label { color: var(--lime); }
  .diag-cta-wrap { text-align: center; padding-top: 8px; }
  .book-btn {
    display: inline-block;
    background: var(--lime); color: #09090b;
    font-family: inherit; font-weight: 800; font-size: 16px;
    padding: 16px 40px; border-radius: 12px;
    text-decoration: none; letter-spacing: -0.01em;
    transition: background 0.15s, transform 0.15s;
    border: none; cursor: pointer;
  }
  .book-btn:hover { background: #c8dc5a; transform: translateY(-2px); }
  .diag-note { margin-top: 12px; font-size: 13px; color: var(--gray); }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(9,9,11,0.94); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border); padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    max-width: 600px; margin: 0 auto; z-index: 100;
  }
  @media(min-width: 601px) { .nav-bar { left: 50%; transform: translateX(-50%); border-radius: 16px 16px 0 0; } }
  .btn { padding: 12px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
  .btn-ghost { background: transparent; color: var(--gray); }
  .btn-ghost:hover { color: var(--white); }
  .btn-primary { background: var(--lime); color: #09090b; flex: 1; max-width: 280px; font-size: 16px; }
  .btn-primary:hover { background: #c8dc5a; transform: translateY(-1px); }
  .btn-submit { background: var(--lime); color: #09090b; flex: 1; max-width: 240px; font-size: 14px; }
  .btn-submit:hover { background: #c8dc5a; }
  .btn-submit:disabled { opacity: 0.6; cursor: default; transform: none; }

  @media(max-width: 480px) {
    .welcome h2 { font-size: 26px; }
    .section-title { font-size: 21px; }
    .chip { font-size: 13px; padding: 10px 14px; }
    .diag-title { font-size: 22px; }
    .book-btn { font-size: 15px; padding: 14px 28px; }
  }
</style>
</head>
<body>

<div id="survey-wrapper">
  <div class="header">
    <div class="logo">Rally<span>Up</span></div>
  </div>

  <div class="container" id="app"></div>

  <div class="nav-bar" id="navBar">
    <button class="btn btn-ghost" id="btnBack" onclick="goBack()">Back</button>
    <button class="btn btn-primary" id="btnNext" onclick="goNext()">Run the 2-minute diagnosis</button>
  </div>
</div>

<!-- DIAGNOSIS SCREEN -->
<div id="confirmation-screen">
  <div class="diag-header">
    <div class="diag-logo">Rally<span>Up</span></div>
    <div class="diag-badge" id="diagBadge">Your diagnosis</div>
    <div class="diag-title" id="diagTitle"></div>
    <p class="diag-subtitle" id="diagSubtitle"></p>
  </div>

  <div class="diag-card" id="diagWhyCard">
    <div class="diag-card-label">Why this fits you</div>
    <div class="diag-card-text" id="diagWhy"></div>
  </div>

  <div class="diag-card cure" id="diagCureCard">
    <div class="diag-card-label">The cure</div>
    <div class="diag-card-text" id="diagCure"></div>
  </div>

  <div class="diag-cta-wrap">
    <a href="https://calendar.app.google/rVLPkBh76oor7gaw6" target="_blank" class="book-btn">
      Book my free 20-minute call &rarr;
    </a>
    <p class="diag-note">No pitch. We'll walk you through exactly how this works for your company.</p>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZxRPNxI__JZEe2daoOzlsEZ4ZXOvX2MHOmrI1-Z_pz1D8d2DkFdANwApo1nQhKWV4/exec';

// ============================================================
// SESSION + UTM TRACKING
// ============================================================

// Generate a unique session ID for this visitor
const SESSION_ID = 'sess_' + Math.random().toString(36).substr(2, 12) + '_' + Date.now();

// Read UTM params from URL (e.g. ?utm_source=email&utm_medium=outreach&utm_campaign=march)
const urlParams  = new URLSearchParams(window.location.search);
const UTM_SOURCE   = urlParams.get('utm_source')   || document.referrer || 'direct';
const UTM_MEDIUM   = urlParams.get('utm_medium')   || '';
const UTM_CAMPAIGN = urlParams.get('utm_campaign') || '';

// Fire a progress update to Google Sheets (upsert by session_id)
function sendProgress(status) {
  try {
    fetch(SCRIPT_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id:   SESSION_ID,
        status:       status,                             // started | in_progress | completed
        last_step:    sections[current] ? sections[current].id : 'completed',
        email:        answers.email     || '',
        company:      answers.company   || '',
        role:         answers.role      || '',
        situation:    answers.situation || '',
        blocker:      answers.blocker   || '',
        urgency:      answers.urgency   || '',
        utm_source:   UTM_SOURCE,
        utm_medium:   UTM_MEDIUM,
        utm_campaign: UTM_CAMPAIGN,
        diagnosis:    answers.diagnosis || ''
      })
    });
  } catch(e) {}
}

// ============================================================
// DIAGNOSIS ENGINE
// ============================================================
const DIAGNOSES = {
  exec: {
    badge: 'Executive EGC',
    title: 'Your <span>executives</span> need to own LinkedIn.',
    subtitle: 'Your leadership has the authority and the stories. The missing piece is a system that turns them into content without adding to their calendar.',
    why: `<ul>
      <li><strong>Exec visibility drives real outcomes</strong> — inbound leads, investor attention, recruiting, partnerships</li>
      <li><strong>The problem isn't motivation</strong> — it's that there's no process to capture what they know</li>
      <li><strong>Most exec content programs die</strong> before they start because the blank page lands on the exec's desk</li>
    </ul>`,
    cure: `<ul>
      <li><strong>15-min monthly interview</strong> with your exec — we handle the rest</li>
      <li><strong>4–6 LinkedIn posts</strong> written in their voice, ready to review and post</li>
      <li><strong>Zero blank page</strong>, zero ghostwriting stress, zero calendar weight</li>
      <li><strong>Freightos</strong> runs this model today</li>
    </ul>`
  },
  leadgen: {
    badge: 'Sales EGC',
    title: 'Your sales team needs <span>LinkedIn presence</span> before the cold outreach lands.',
    subtitle: 'The first thing a prospect does after your rep\'s cold email lands? They check their LinkedIn. A dead profile kills the deal before it starts.',
    why: `<ul>
      <li><strong>Blank profiles lose deals</strong> — prospects Google the sender and lose trust immediately</li>
      <li><strong>Warm recognition changes everything</strong> — a small amount of consistent content is all it takes</li>
      <li><strong>Your reps have the expertise</strong> — they just don't have a system to turn it into posts</li>
    </ul>`,
    cure: `<ul>
      <li><strong>Content engine for your sales team</strong> — templated posts, regular publishing rhythm</li>
      <li><strong>Light editorial support</strong> so reps never face a blank page</li>
      <li><strong>By the time they reach out</strong>, prospects already recognise the name</li>
      <li><strong>Result:</strong> warmer pipes, better reply rates, shorter cycles</li>
    </ul>`
  },
  awareness: {
    badge: 'Company-wide EGC',
    title: 'Your team has the potential. It just needs <span>a system</span>.',
    subtitle: 'It\'s not a motivation problem. It\'s an infrastructure problem. Without the right scaffolding, consistent company-wide content is nearly impossible.',
    why: `<ul>
      <li><strong>Asking nicely doesn't work</strong> — weekly reminder campaigns die after two weeks</li>
      <li><strong>Three things kill it every time:</strong> blank page fear, no coordinator, no content rhythm</li>
      <li><strong>15–30 people posting consistently</strong> without a full-time manager requires the right system</li>
    </ul>`,
    cure: `<ul>
      <li><strong>Templates and editorial rhythms</strong> that make posting easy and repeatable</li>
      <li><strong>Light activation layer</strong> so employees don't have to think too hard</li>
      <li><strong>Compounds over time</strong> — company-wide presence that builds without becoming someone's entire job</li>
      <li><strong>PandaDoc</strong> runs this model today</li>
    </ul>`
  }
};

function getDiagnosis() {
  const role      = answers.role      || '';
  const situation = answers.situation || '';
  const blocker   = answers.blocker   || '';

  const scores = { exec: 0, leadgen: 0, awareness: 0 };

  if (role.includes('Founder') || role.includes('C-Suite'))                           scores.exec      += 3;
  if (role.includes('Sales')   || role.includes('RevOps'))                            scores.leadgen   += 3;
  if (role.includes('Marketing') || role.includes('Comms') || role.includes('Brand')) scores.awareness += 3;

  if (situation.includes('leadership') && situation.includes('visible'))              scores.exec      += 4;
  if (situation.includes('sales team') || situation.includes('warm up'))              scores.leadgen   += 4;
  if (situation.includes("can't get")  || situation.includes('consistently'))         scores.awareness += 4;

  // Updated to match new chip text
  if (situation.includes('too busy'))                                                 scores.exec      += 4;
  if (situation.includes('Sales reps'))                                               scores.leadgen   += 4;
  if (situation.includes("won't post"))                                               scores.awareness += 4;

  if (blocker.includes('Leadership') && blocker.includes('priority'))                 scores.exec      += 1;
  if (blocker.includes('blank page'))                                               { scores.exec += 1; scores.awareness += 1; }
  if (blocker.includes('chase') || blocker.includes('nervous'))                       scores.awareness += 1;

  const max = Math.max(scores.exec, scores.leadgen, scores.awareness);
  if (scores.exec    === max) return 'exec';
  if (scores.leadgen === max) return 'leadgen';
  return 'awareness';
}

// ============================================================
// SURVEY SECTIONS
// ============================================================
const sections = [
  {
    id: 'welcome', label: 'Welcome',
    render: () => `
      <div class="welcome">
        <h2>Find out which employee content play fits your company.</h2>
        <p>5 questions. 2 minutes. We'll tell you exactly which of our 3 EGC plays fits you, and what's in the way.</p>
        <button class="welcome-cta" onclick="goNext()">Run the 2-minute diagnosis &rarr;</button>
      </div>`
  },
  {
    id: 'role', label: 'Your Role',
    render: () => `
      <div class="section-title">What best describes your role?</div>
      <div class="question">
        <div class="chips" data-key="role" data-multi="false">
          <div class="chip">Founder or C-Suite Executive</div>
          <div class="chip">Marketing, Comms, or Brand Manager</div>
          <div class="chip">Sales Leader or RevOps</div>
          <div class="chip">Other</div>
        </div>
        <div class="field-error" id="err-role">Please select an option to continue.</div>
      </div>`
  },
  {
    id: 'situation', label: 'Your Situation',
    render: () => `
      <div class="section-title">Which of these sounds most like your company right now?</div>
      <div class="question">
        <div class="chips" data-key="situation" data-multi="false">
          <div class="chip">Leadership is too busy to post on LinkedIn</div>
          <div class="chip">Employees won't post consistently</div>
          <div class="chip">Sales reps need LinkedIn presence before cold outreach</div>
          <div class="chip">Not really on our radar yet</div>
        </div>
        <div class="field-error" id="err-situation">Please select an option to continue.</div>
      </div>`
  },
  {
    id: 'blocker', label: 'The Blocker',
    render: () => `
      <div class="section-title">What's the biggest reason employee content hasn't stuck at your company?</div>
      <div class="question">
        <div class="chips" data-key="blocker" data-multi="false">
          <div class="chip">People don't know what to write, blank page problem</div>
          <div class="chip">No one has time to chase colleagues for content</div>
          <div class="chip">People are nervous about posting publicly</div>
          <div class="chip">Leadership doesn't see it as a priority yet</div>
          <div class="chip">We tried before and it didn't get traction</div>
        </div>
        <div class="field-error" id="err-blocker">Please select an option to continue.</div>
      </div>`
  },
  {
    id: 'urgency', label: 'Urgency',
    render: () => `
      <div class="section-title">How urgent is solving this over the next 3 months?</div>
      <div class="question">
        <div class="chips" data-key="urgency" data-multi="false">
          <div class="chip">Not a priority right now</div>
          <div class="chip">On the radar but nothing planned</div>
          <div class="chip">Actively looking for a solution</div>
        </div>
        <div class="field-error" id="err-urgency">Please select an option to continue.</div>
      </div>`
  },
  {
    id: 'email', label: 'Your Email',
    render: () => `
      <div class="section-title">Last one.</div>
      <div class="question">
        <div class="q-label">Work email</div>
        <input type="email" id="emailInput" placeholder="you@company.com" autocomplete="email">
        <div class="field-error" id="err-email">Please enter a valid email to continue.</div>
      </div>
      <div class="question">
        <div class="q-label" style="font-weight:400; color:var(--gray); font-size:14px;">Company name <span style="opacity:0.5">(optional)</span></div>
        <input type="text" id="companyInput" placeholder="e.g. Acme Inc">
      </div>`
  }
];

let current = 0;
const answers = {};

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="section active">${sections[current].render()}</div>`;

  app.querySelectorAll('.chips').forEach(container => {
    const key = container.dataset.key;
    if (answers[key]) {
      container.querySelectorAll('.chip').forEach(c => {
        if (c.textContent.trim() === answers[key]) c.classList.add('selected');
      });
    }
    container.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        answers[key] = chip.textContent.trim();
      });
    });
  });

  if (sections[current].id === 'email') {
    const emailInput   = document.getElementById('emailInput');
    const companyInput = document.getElementById('companyInput');
    if (emailInput   && answers.email)   emailInput.value   = answers.email;
    if (companyInput && answers.company) companyInput.value = answers.company;
  }

  updateUI();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateUI() {
  const back = document.getElementById('btnBack');
  const next = document.getElementById('btnNext');
  const nav  = document.getElementById('navBar');

  nav.style.display = current === 0 ? 'none' : 'flex';
  back.style.visibility = current === 0 ? 'hidden' : 'visible';

  if (current === 0) {
    next.textContent = 'Run the 2-minute diagnosis';
    next.className   = 'btn btn-primary';
    next.onclick     = goNext;
  } else if (current === sections.length - 1) {
    next.textContent = 'Get my diagnosis';
    next.className   = 'btn btn-submit';
    next.onclick     = handleSubmit;
  } else {
    next.textContent = 'Continue';
    next.className   = 'btn btn-primary';
    next.onclick     = goNext;
  }
}

function showErr(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function goNext() {
  const id = sections[current].id;
  if (id === 'role'      && !answers.role)      { showErr('err-role');      return; }
  if (id === 'situation' && !answers.situation)  { showErr('err-situation'); return; }
  if (id === 'blocker'   && !answers.blocker)    { showErr('err-blocker');   return; }
  if (id === 'urgency'   && !answers.urgency)    { showErr('err-urgency');   return; }

  if (current < sections.length - 1) {
    current++;
    render();

    // Fire progress tracking after advancing
    const isStart = sections[current - 1].id === 'welcome';
    const status  = isStart ? 'started' : 'in_progress';
    sendProgress(status);
  }
}

function goBack() {
  if (current > 0) { current--; render(); }
}

function showDiagnosis(key) {
  const d = DIAGNOSES[key];
  document.getElementById('diagBadge').textContent    = 'Your diagnosis: ' + d.badge;
  document.getElementById('diagTitle').innerHTML      = d.title;
  document.getElementById('diagSubtitle').textContent = d.subtitle;
  document.getElementById('diagWhy').innerHTML        = d.why;
  document.getElementById('diagCure').innerHTML       = d.cure;

  document.getElementById('survey-wrapper').style.display      = 'none';
  document.getElementById('navBar').style.display              = 'none';
  document.getElementById('confirmation-screen').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleSubmit() {
  const emailEl   = document.getElementById('emailInput');
  const companyEl = document.getElementById('companyInput');
  const email     = emailEl   ? emailEl.value.trim()   : '';
  const company   = companyEl ? companyEl.value.trim() : '';

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showErr('err-email');
    return;
  }

  answers.email   = email;
  answers.company = company;

  const diagnosisKey   = getDiagnosis();
  const diagnosisLabel = DIAGNOSES[diagnosisKey].badge;
  answers.diagnosis    = diagnosisLabel;

  const btn = document.getElementById('btnNext');
  btn.disabled    = true;
  btn.textContent = 'Calculating...';

  // Fire completed row to Google Sheets
  sendProgress('completed');

  showDiagnosis(diagnosisKey);
}

render();
</script>
</body>
</html>
