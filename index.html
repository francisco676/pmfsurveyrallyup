<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RallyUp - EGC Diagnostic Survey</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #09090b;
    --surface: #18181b;
    --border: rgba(255,255,255,0.08);
    --gray: #71717a;
    --white: #fafafa;
    --lime: #D8EC6A;
    --lime-dim: rgba(216,236,106,0.12);
    --lime-border: rgba(216,236,106,0.25);
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    line-height: 1.6;
  }

  .header {
    padding: 36px 24px 0;
    max-width: 600px;
    margin: 0 auto;
    text-align: center;
  }
  .logo {
    font-size: 20px; font-weight: 800; letter-spacing: -0.03em;
    margin-bottom: 20px; display: inline-block;
  }
  .logo span { color: var(--lime); }
  .header h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
  .header p { color: var(--gray); font-size: 15px; max-width: 440px; margin: 0 auto 8px; line-height: 1.65; }
  .time-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--lime-dim); border: 1px solid var(--lime-border);
    color: var(--lime); font-size: 12px; font-weight: 600;
    padding: 5px 14px; border-radius: 50px; margin-top: 12px;
  }
  .time-badge::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; background: var(--lime); border-radius: 50%;
  }

  .progress-wrap { max-width: 600px; margin: 28px auto 0; padding: 0 24px; }
  .progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%; width: 0%; background: var(--lime);
    border-radius: 4px; transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .progress-label {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-size: 12px; color: var(--gray); font-weight: 500;
  }

  .container { max-width: 600px; margin: 0 auto; padding: 24px 24px 120px; }
  .section { display: none; animation: fadeIn 0.35s ease; }
  .section.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--lime); margin-bottom: 6px;
  }
  .section-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em; }
  .section-desc { font-size: 14px; color: var(--gray); margin-bottom: 28px; line-height: 1.6; }

  .question { margin-bottom: 28px; }
  .q-label { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .q-hint { font-size: 13px; color: var(--gray); margin-bottom: 10px; line-height: 1.55; }

  input[type="email"], input[type="text"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; color: var(--white);
    font-family: inherit; font-size: 15px;
    transition: border-color 0.2s; outline: none;
  }
  input[type="email"]:focus, input[type="text"]:focus { border-color: rgba(216,236,106,0.4); }
  input::placeholder { color: var(--gray); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 10px 18px; border-radius: 50px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; user-select: none; line-height: 1.4;
    text-align: left;
  }
  .chip:hover { border-color: var(--lime-border); background: var(--lime-dim); }
  .chip.selected { background: var(--lime-dim); border-color: var(--lime); color: var(--lime); }

  .field-error { font-size: 13px; color: #f87171; margin-top: 10px; display: none; }
  .field-error.show { display: block; }

  .welcome { text-align: center; padding: 40px 0 0; }
  .welcome h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
  .welcome p { color: var(--gray); font-size: 16px; max-width: 420px; margin: 0 auto 32px; line-height: 1.7; }
  .welcome-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-bottom: 8px; }
  .wc { padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  .wc h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .wc p { font-size: 12px; color: var(--gray); margin: 0; }

  .done { text-align: center; padding: 60px 0; }
  .done .check {
    width: 68px; height: 68px; border-radius: 50%;
    background: var(--lime-dim); border: 2px solid var(--lime);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 20px; color: var(--lime);
  }
  .done h2 { font-size: 26px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.02em; }
  .done p { color: var(--gray); font-size: 15px; max-width: 400px; margin: 0 auto 28px; line-height: 1.7; }
  .done-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--lime); border-radius: 10px;
    padding: 18px 22px; text-align: left; font-size: 14px;
    color: var(--gray); margin-bottom: 28px; line-height: 1.7;
  }
  .done-card strong { color: var(--white); }
  .done-link {
    display: inline-block; background: var(--lime); color: #09090b;
    font-weight: 700; font-size: 14px; padding: 13px 28px;
    border-radius: 10px; text-decoration: none; transition: background 0.15s;
  }
  .done-link:hover { background: #c8dc5a; }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(9,9,11,0.94); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border); padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    max-width: 600px; margin: 0 auto; z-index: 100;
  }
  @media(min-width: 601px) {
    .nav-bar { left: 50%; transform: translateX(-50%); border-radius: 16px 16px 0 0; }
  }
  .btn {
    padding: 12px 28px; border-radius: 10px; font-size: 15px;
    font-weight: 600; cursor: pointer; border: none;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-ghost { background: transparent; color: var(--gray); }
  .btn-ghost:hover { color: var(--white); }
  .btn-primary { background: var(--lime); color: #09090b; flex: 1; max-width: 180px; }
  .btn-primary:hover { background: #c8dc5a; transform: translateY(-1px); }
  .btn-submit { background: var(--lime); color: #09090b; flex: 1; max-width: 240px; }
  .btn-submit:hover { background: #c8dc5a; }
  .btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  @media(max-width: 480px) {
    .welcome-cards { grid-template-columns: 1fr; }
    .header h1 { font-size: 21px; }
    .section-title { font-size: 20px; }
    .chip { font-size: 13px; padding: 10px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Rally<span>Up</span></div>
  <h1>Which EGC play fits your company?</h1>
  <p>Answer 5 quick questions and we'll book a free 20-minute EGC Diagnostic call with you. No pitch, just a clear recommendation.</p>
  <div class="time-badge">Takes 90 seconds</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label">
    <span id="sectionLabel">Welcome</span>
    <span id="progressPct">0%</span>
  </div>
</div>

<div class="container" id="app"></div>

<div class="nav-bar" id="navBar">
  <button class="btn btn-ghost" id="btnBack" onclick="goBack()">Back</button>
  <button class="btn btn-primary" id="btnNext" onclick="goNext()">Get Started</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZxRPNxI__JZEe2daoOzlsEZ4ZXOvX2MHOmrI1-Z_pz1D8d2DkFdANwApo1nQhKWV4/exec';

const sections = [
  {
    id: 'welcome', label: 'Welcome', render: () => `
    <div class="welcome">
      <h2>Quick intro</h2>
      <p>We're running a short research sprint to understand which of our three employee content plays resonates most with companies like yours. Your answers take 90 seconds and unlock a free diagnostic call with our team.</p>
      <div class="welcome-cards">
        <div class="wc"><h4>5 questions</h4><p>Mostly single choice</p></div>
        <div class="wc"><h4>90 seconds</h4><p>Built for busy people</p></div>
        <div class="wc"><h4>Free diagnostic call</h4><p>Yours on completion</p></div>
        <div class="wc"><h4>No pitch</h4><p>Just a clear recommendation</p></div>
      </div>
    </div>`
  },
  {
    id: 'role', label: 'Your Role', render: () => `
    <div class="section-label">Question 1 of 5</div>
    <div class="section-title">What best describes your role?</div>
    <div class="section-desc">Helps us make sense of your other answers.</div>
    <div class="question">
      <div class="chips" data-key="role" data-multi="false">
        <div class="chip">Founder or C-Suite Executive</div>
        <div class="chip">Marketing, Comms, or Brand Manager</div>
        <div class="chip">Sales Leader or RevOps</div>
        <div class="chip">Other</div>
      </div>
      <div class="field-error" id="err-role">Please select an option to continue.</div>
    </div>`
  },
  {
    id: 'situation', label: 'Your Situation', render: () => `
    <div class="section-label">Question 2 of 5</div>
    <div class="section-title">Which of these sounds most like your company right now?</div>
    <div class="section-desc">Pick the one that stings the most.</div>
    <div class="question">
      <div class="chips" data-key="situation" data-multi="false">
        <div class="chip">Our leadership needs to be more visible on LinkedIn, but they're too busy to do it themselves</div>
        <div class="chip">We know employee content works, but we can't get people to post consistently</div>
        <div class="chip">Our sales team needs a stronger LinkedIn presence to warm up prospects before outreach</div>
        <div class="chip">None of these are really on our radar yet</div>
      </div>
      <div class="field-error" id="err-situation">Please select an option to continue.</div>
    </div>`
  },
  {
    id: 'blocker', label: 'The Blocker', render: () => `
    <div class="section-label">Question 3 of 5</div>
    <div class="section-title">What's the biggest reason employee LinkedIn content hasn't happened (or stuck) at your company?</div>
    <div class="section-desc">No wrong answers here.</div>
    <div class="question">
      <div class="chips" data-key="blocker" data-multi="false">
        <div class="chip">People don't know what to write, blank page problem</div>
        <div class="chip">No one has time to chase colleagues for content every week</div>
        <div class="chip">People are nervous about saying the wrong thing publicly</div>
        <div class="chip">Leadership doesn't see it as a priority yet</div>
        <div class="chip">We tried it before and it didn't get traction</div>
      </div>
      <div class="field-error" id="err-blocker">Please select an option to continue.</div>
    </div>`
  },
  {
    id: 'urgency', label: 'Urgency', render: () => `
    <div class="section-label">Question 4 of 5</div>
    <div class="section-title">How urgent is solving this over the next 3 months?</div>
    <div class="section-desc">Honest answer only.</div>
    <div class="question">
      <div class="chips" data-key="urgency" data-multi="false">
        <div class="chip">Not a priority right now</div>
        <div class="chip">On the radar but nothing planned</div>
        <div class="chip">Actively looking for a solution</div>
      </div>
      <div class="field-error" id="err-urgency">Please select an option to continue.</div>
    </div>`
  },
  {
    id: 'email', label: 'Your Email', render: () => `
    <div class="section-label">Question 5 of 5</div>
    <div class="section-title">Last one.</div>
    <div class="section-desc">Where should we reach out to book your free 20-minute EGC Diagnostic call?</div>
    <div class="question">
      <div class="q-label">Work email</div>
      <input type="email" data-key="email" placeholder="you@company.com" autocomplete="email">
      <div class="field-error" id="err-email">Please enter a valid work email to claim your free call.</div>
    </div>
    <div class="question">
      <div class="q-label" style="font-weight:400; color:var(--gray); font-size:14px;">Company name <span style="opacity:0.5">(optional)</span></div>
      <input type="text" data-key="company" placeholder="e.g. Acme Inc">
    </div>`
  },
];

let current = 0;
const answers = {};

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="section active">${sections[current].render()}</div>`;

  app.querySelectorAll('[data-key]').forEach(el => {
    const k = el.dataset.key;
    if (answers[k] === undefined) return;
    if (el.tagName === 'INPUT') {
      el.value = answers[k];
    } else if (el.classList.contains('chips')) {
      const sel = Array.isArray(answers[k]) ? answers[k] : [answers[k]];
      el.querySelectorAll('.chip').forEach(c => {
        if (sel.includes(c.textContent.trim())) c.classList.add('selected');
      });
    }
  });

  app.querySelectorAll('.chips').forEach(container => {
    const multi = container.dataset.multi === 'true';
    container.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        if (!multi) container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        chip.classList.toggle('selected');
        saveAll();
      });
    });
  });

  app.querySelectorAll('input').forEach(el => el.addEventListener('input', saveAll));

  updateUI();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function saveAll() {
  document.querySelectorAll('[data-key]').forEach(el => {
    const k = el.dataset.key;
    if (el.tagName === 'INPUT') {
      answers[k] = el.value;
    } else if (el.classList.contains('chips')) {
      const sel = [...el.querySelectorAll('.chip.selected')].map(c => c.textContent.trim());
      answers[k] = el.dataset.multi === 'true' ? sel : (sel[0] || '');
    }
  });
}

function updateUI() {
  const total = sections.length - 1;
  const pct   = current === 0 ? 0 : current >= total ? 100 : Math.round((current / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent  = pct + '%';
  document.getElementById('sectionLabel').textContent = sections[current].label;

  const back = document.getElementById('btnBack');
  const next = document.getElementById('btnNext');
  const nav  = document.getElementById('navBar');

  back.style.visibility = current === 0 ? 'hidden' : 'visible';

  if (current === 0) {
    next.textContent = 'Get Started';
    next.className   = 'btn btn-primary';
    nav.style.display = '';
  } else if (current === sections.length - 2) {
    next.textContent = 'Claim my free call';
    next.className   = 'btn btn-submit';
    nav.style.display = '';
  } else if (current === sections.length - 1) {
    nav.style.display = 'none';
  } else {
    next.textContent = 'Continue';
    next.className   = 'btn btn-primary';
    nav.style.display = '';
  }
}

function showErr(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function validate(id) {
  if (id === 'role'      && !answers.role)      { showErr('err-role');      return false; }
  if (id === 'situation' && !answers.situation)  { showErr('err-situation'); return false; }
  if (id === 'blocker'   && !answers.blocker)    { showErr('err-blocker');   return false; }
  if (id === 'urgency'   && !answers.urgency)    { showErr('err-urgency');   return false; }
  if (id === 'email') {
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(answers.email || '')) { showErr('err-email'); return false; }
  }
  return true;
}

function goNext() {
  saveAll();
  if (!validate(sections[current].id)) return;
  if (sections[current].id === 'email') {
    submitToSheets();
    return;
  }
  current++;
  render();
}

function goBack() {
  saveAll();
  if (current > 0) { current--; render(); }
}

function submitToSheets() {
  fetch(SCRIPT_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      timestamp:  new Date().toISOString(),
      email:      answers.email      || '',
      company:    answers.company    || '',
      role:       answers.role       || '',
      situation:  answers.situation  || '',
      blocker:    answers.blocker    || '',
      urgency:    answers.urgency    || '',
      source:     document.referrer  || 'direct'
    })
  }).catch(() => {}).finally(() => {
    window.location.href = 'https://calendar.app.google/rVLPkBh76oor7gaw6';
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Enter' && e.metaKey) goNext(); });

render();
</script>
